[package]
name = "effect-stream-file"
version = "0.1.0"
edition = "2021"
authors = ["Tom <tom@streamweave.dev>"]
description = "File-based streams for the Effect ecosystem"
license = "MIT"
repository = "https://github.com/streamweave/effect"
readme = "README.md"

[dependencies]
effect-core = { path = "../effect-core" }
effect-stream = { path = "../effect-stream" }
tokio = { version = "1.36", features = ["fs", "io-util"] }
anyhow = "1.0"
thiserror = "1.0"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.10"
